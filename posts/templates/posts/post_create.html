{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>
        {% if post %}
            Edit Post - ContentForge
        {% else %}
            Create Post - ContentForge
        {% endif %}
    </title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <main class="container">
        {% if post %}
            <h1>Edit Post</h1>
        {% else %}
            <h1>Create Post</h1>
        {% endif %}

        <form method="post" enctype="multipart/form-data" class="card">
            {% csrf_token %}
            {{ form.as_p }}

            {% if post %}
                <button class="button" type="submit">Save Changes</button>
            {% else %}
                <button class="button" type="submit">Generate Drafts</button>
            {% endif %}
        </form>

        <p>
            <a href="{% url 'post_list' %}">Back to posts</a>
        </p>
    </main>
</body>
</html>
