{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Preview - {{ post.title }}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <main class="container">
        <h1>Preview: {{ post.title }}</h1>

        <section class="card">
            <h2>X</h2>
            <p>{{ post.x_text }}</p>
        </section>

        <section class="card">
            <h2>Reddit</h2>
            <h3>{{ post.reddit_title }}</h3>
            <p>{{ post.reddit_body }}</p>
        </section>

        <section class="card">
            <h2>Instagram</h2>
            <p>{{ post.instagram_caption|linebreaks }}</p>
        </section>

        <p>
            <a href="{% url 'post_detail' post.pk %}">Back to detail</a>
        </p>
    </main>
</body>
</html>
